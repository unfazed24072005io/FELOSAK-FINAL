workflows:
  build:
    name: Build APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
    scripts:
      - name: npm install
        script: npm install
      
      - name: Build
        script: npx expo prebuild --platform android && cd android && ./gradlew assembleRelease && cd .. && cp android/app/build/outputs/apk/release/app-release.apk ./app.apk || true
      
    artifacts:
      - "*.apk"
