workflows:
  android-apk-cloud:
    name: Android APK Cloud Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      npm: 9
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Install EAS CLI
        script: npm install -g eas-cli
      
      - name: Login to Expo
        script: |
          eas login --username your-username --password your-password
      
      - name: Build APK on EAS servers
        script: |
          eas build --platform android --profile preview --non-interactive --wait
      
    artifacts:
      - "*.apk"
