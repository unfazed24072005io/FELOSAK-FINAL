workflows:
  build:
    name: Build APK with EAS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      # Add the EXPO_TOKEN to your environment variables in Codemagic UI
      # Go to: Team > Environment variables > Add new variable
      # Name: EXPO_TOKEN
      # Value: (paste your token from Expo dashboard)
      # Group: Expo
    scripts:
      - name: npm install
        script: npm install
      
      - name: Install EAS CLI
        script: npm install -g eas-cli
      
      - name: Build APK
        script: eas build --platform android --profile preview --local --non-interactive --output=./app.apk
      
    artifacts:
      - "app.apk"
