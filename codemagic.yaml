workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      npm: 9
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Install Expo CLI
        script: npm install -g expo-cli
      
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
      
      - name: Copy APK
        script: cp android/app/build/outputs/apk/release/app-release.apk ./FELOSAAK-APP.apk
      
    artifacts:
      - FELOSAAK-APP.apk
